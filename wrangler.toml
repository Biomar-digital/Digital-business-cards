# Cloudflare Worker (con Static Assets) — mismo patrón que el resto de
# proyectos de la cuenta (.workers.dev). El Worker sirve la API en /api y el
# panel compilado (web/dist) como estático.
#
# Build command (en Cloudflare):  npm run build
# Deploy command (en Cloudflare):  npx wrangler deploy

name = "igitalbusinesscards"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Panel React compilado servido como estático.
[assets]
directory = "./web/dist"
binding = "ASSETS"

# ── Variables NO secretas ──
[vars]
PROVIDER_MODE = "mock"            # mock | live
ADDTOWALLET_BASE_URL = "https://app.addtowallet.co/api"
ADDTOWALLET_TEMPLATE_ID = "6a0edd8fbd302f5983d094e4"
QRCODE_BASE_URL = "https://api.qr-code-generator.com/v1"
QRCODE_SHORT_DOMAIN = "qrco.de"
QRCODE_TEMPLATE_ID = "84848399"
EMAIL_PROVIDER = "brevo"          # brevo | addtowallet
EMAIL_FROM = "BioMar Digital Business Cards <marketing@biomar.com>"

# ── Base de datos D1 ──
# El Worker crea las tablas solo en el primer arranque (ver src/lib/db.js),
# así que no hace falta cargar schema.sql a mano.
[[d1_databases]]
binding = "DB"
database_name = "dbc"
database_id = "6d489f5d-7d69-4ecf-848d-91b1bcc3b1f4"

# ── Secretos (NO van aquí) ──
# Configúralos en el Worker (Settings → Variables and Secrets) o en local en
# .dev.vars. Son: ADMIN_TOKEN, ADDTOWALLET_API_KEY, QRCODE_API_KEY, BREVO_API_KEY
